# Zensical currently reads this MkDocs-compatible config during migration.

site_name: TAAC 2026 Docs
site_description: TAAC 2026 训练框架、实验包与开发约定
site_author: TAAC 2026 Team
site_url: !ENV [SITE_URL, 'https://puiching-memory.github.io/TAAC_2026/']
docs_dir: docs

theme:
  name: material
  language: zh
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 架构与概念: architecture.md
  - 实验包:
      - 总览: experiments/index.md
      - Baseline: experiments/baseline.md
      - CTR Baseline: experiments/ctr-baseline.md
      - DeepContextNet: experiments/deepcontextnet.md
      - Grok: experiments/grok.md
      - HyFormer: experiments/hyformer.md
      - InterFormer: experiments/interformer.md
      - OneTrans: experiments/onetrans.md
      - O_o: experiments/oo.md
      - UniRec: experiments/unirec.md
      - UniScaleFormer: experiments/uniscaleformer.md
  - 指南:
      - 超参数搜索: guide/search.md
      - 测试: guide/testing.md
      - 新增实验包: guide/contributing.md
  - 论文:
      - HyFormer: papers/hyformer.md
      - InterFormer: papers/interformer.md
      - OneTrans: papers/onetrans.md
